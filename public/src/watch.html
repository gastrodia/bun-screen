<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ccc;
            align-items: center;
        }

        .header h1 {
            margin: 0;
        }

        .main {
            margin-top: 10px;
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #preview {
            flex: 1;
            border: 1px solid #ccc;
            overflow: hidden;
        }

        .message {
            width: 300px;
            border: 1px solid #ccc;
            margin: 0 0 0 10px;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .message-list {
            padding: 0 0 0 24px;
            margin: 0;
            flex: 1;
            overflow-y: auto;
        }

        #danmaku {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }

        #danmaku input {
            flex: 1;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        #danmaku button {
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-left: 10px;
        }

        .room-list {
            padding: 0;
            list-style: none;
            width: 300px;
            border: 1px solid #ccc;
            margin: 0 10px 0 0;
        }

        .room-list li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .room-list li img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="title"></h1>
    </div>
    <div class="main">
        <ul class="room-list"></ul>
        <video id="preview" controls></video>
        <div class="message">
            <ul class="message-list"></ul>
            <form id="danmaku">
                <input type="text" placeholder="请输入消息">
                <button type="submit">发送</button>
            </form>
        </div>
    </div>
</div>
<script type="module">
    import {
        generateClientId,
        buildWsUrl,
        makeMessageAppender,
        sendSocketMessage,
        dispatchSocketMessage,
        addIceCandidateSafe,
        flushIceCandidates,
    } from './shared.js'

    class Watch {
        constructor() {
            const params = new URLSearchParams(location.search)
            this.video = document.getElementById('preview')
            this.title = document.getElementById('title')
            this.messageContainer = document.querySelector('.message-list')
            this.setMessage = makeMessageAppender(this.messageContainer)
            this.socket = null
            this.socketUrl = buildWsUrl()
            this.roomContainer = document.querySelector('.room-list')
            this.peer = null
            this.username = params.get('uname')
            this.userId = params.get('uid') || generateClientId()
            this.danmaku = document.getElementById('danmaku')
            this.heartbeatTimer = null
            this.reconnectTimer = null
            this.rtcConfig = {
                iceServers: [
                    {urls: 'stun:stun.l.google.com:19302'}
                ]
            }
        }

        get roomId() {
            const params = new URLSearchParams(location.search)
            return params.get('id')
        }

        set roomId(value) {
            const params = new URLSearchParams(location.search)
            params.set('id', value)
            history.pushState(null, '', `?${params}`)
        }

        messageHandler = {
            offer: async (data) => {
                const {offer} = data
                if (!this.peer) {
                    this.setMessage('连接尚未准备好，无法处理 offer')
                    return
                }
                await this.peer.setRemoteDescription(offer)
                flushIceCandidates(this.peer)
                const answer = await this.peer.createAnswer()
                await this.peer.setLocalDescription(answer)
                this.sendMessage('answer', {
                    answer,
                    userId: this.userId,
                    roomId: this.roomId
                })
            },
            error: (e) => {
                this.setMessage(e.message)
            },
            success: (e) => {
                this.setMessage(e.message)
            },
            close: (e) => {
                // 服务端确认房间真的关闭（主播 TTL 过期/主动关播）：彻底清理，不再重连
                this.setMessage(e.message)
                this.cleanupConnections()
            },
            icecandidate: (data) => {
                if (!this.peer) return
                addIceCandidateSafe(this.peer, data.candidate)
            },
            updateRooms: (data) => {
                this.getRoom()
                const {type, roomId} = data
                if (type === 'create' && roomId === this.roomId) {
                    this.enterRoom()
                }
            },
            danmaku: (data) => {
                const li = document.createElement('li')
                const possessor = document.createElement('label')
                const {roomId, admin, message, username, userId} = data
                let part = ''
                if (admin) part = 'UP主'
                else if (userId === this.userId) part = '我'
                else part = `${username}(${userId})`
                possessor.textContent = `${part}说：`
                const content = document.createElement('span')
                content.textContent = message
                li.appendChild(possessor)
                li.appendChild(content)
                this.setMessage(li)
            }
        }

        async start() {
            this.inputUsername()
            this.registerEvent()
            await this.getRoom()
            if (this.roomId) {
                await this.enterRoom()
            } else {
                this.setMessage('请选择房间后再进入')
            }
        }

        inputUsername() {
            while (!this.username) {
                this.username = prompt('请输入用户名')
            }
            this.title.textContent = `hi, ${this.username}(${this.userId})`
            const params = new URLSearchParams(location.search)
            params.set('uid', this.userId)
            params.set('uname', this.username)
            history.pushState(null, '', `?${params}`)
        }

        async getRoom() {
            try {
                const res = await fetch('/api/rooms')
                if (!res.ok) throw new Error('fetch rooms failed')
                const rooms = await res.json()
                this.roomContainer.innerHTML = ''
                const fragment = document.createDocumentFragment()
                for (const room of rooms) {
                    const li = document.createElement('li')
                    const a = document.createElement('a')
                    const params = new URLSearchParams({
                        id: room.id,
                        uid: this.userId,
                        uname: this.username
                    })

                    const cover = document.createElement('img')
                    cover.src = room.cover
                    a.href = `?${params}`
                    a.textContent = `${room.name}(${room.id})的房间`
                    li.appendChild(cover)
                    li.appendChild(a)
                    fragment.appendChild(li)
                }
                this.roomContainer.appendChild(fragment)
            } catch (err) {
                this.setMessage('房间列表获取失败，请稍后重试')
            }
        }

        async enterRoom() {
            // if (!this.roomId) return
            this.cleanupConnections()
            this.createPeer()
            this.connectSocket()
        }

        // 建立 RTCPeerConnection（媒体流不随信令断开而拆除，故与 socket 分开）
        createPeer() {
            this.peer = new RTCPeerConnection(this.rtcConfig)
            // 确保协商时有可接收的媒体描述
            this.peer.addTransceiver('video', {direction: 'recvonly'})
            this.peer.ontrack = (e) => {
                this.video.srcObject = e.streams[0]
                this.video.play().catch(this.play.bind(this))
            }
            this.peer.onicecandidate = (e) => {
                if (e.candidate) {
                    this.sendMessage('icecandidate', {
                        candidate: e.candidate,
                        userId: this.userId,
                        roomId: this.roomId
                    })
                }
            }
        }

        // 建立信令连接（首次进入与重连共用）
        connectSocket() {
            this.socket = new WebSocket(this.socketUrl)
            this.socket.onopen = this.socketOnOpen.bind(this)
            this.socket.onmessage = this.socketOnMessage.bind(this)
            this.socket.onerror = this.socketOnError.bind(this)
            this.socket.onclose = this.socketOnClose.bind(this)
        }

        startHeartbeat() {
            this.stopHeartbeat()
            this.heartbeatTimer = setInterval(() => this.sendMessage('heartbeat', {}), 25000)
        }

        stopHeartbeat() {
            if (this.heartbeatTimer) {
                clearInterval(this.heartbeatTimer)
                this.heartbeatTimer = null
            }
        }

        // Vercel 函数 ~60s 回收导致信令断开：保留 peer 与视频，静默重连后重新 join
        scheduleReconnect() {
            if (this.reconnectTimer || !this.peer) return
            this.reconnectTimer = setTimeout(() => {
                this.reconnectTimer = null
                if (this.peer && this.roomId) this.connectSocket()
            }, 500)
        }

        // 手动点击播放
        play() {
            const li = document.createElement('li')
            li.style.color = 'red'
            const span = document.createElement('span')
            span.textContent = '由于浏览器自动播放策略，'
            const a = document.createElement('a')
            a.href = 'javascript:void(0)'
            a.textContent = '点击这里播放'
            a.onclick = () => {
                this.video.play()
                li.remove()
            }
            li.appendChild(span)
            li.appendChild(a)
            this.setMessage(li)
        }

        socketOnOpen() {
            this.sendMessage('join', {
                roomId: this.roomId,
                userId: this.userId,
                username: this.username
            })
            this.startHeartbeat()
        }

        socketOnMessage(e) {
            dispatchSocketMessage(this.messageHandler, e)
        }

        sendMessage(type, data) {
            sendSocketMessage(this.socket, type, data, () =>
                this.setMessage('连接未就绪，消息未发送'))
        }

        socketOnError() {
            // 由随后的 onclose 触发静默重连，不在这里拆 peer
        }

        socketOnClose() {
            // 仅「当前在用的 socket」自发断开（如 Vercel 回收）才会走到这里——
            // 主动废弃的旧 socket 已在 detachSocket 里摘掉回调，不会触发。
            this.stopHeartbeat()
            this.socket = null
            // 信令断开但仍在观看：保留 peer 与视频，静默重连后重新 join
            this.scheduleReconnect()
        }

        // 摘掉 socket 的全部回调，使其后续事件不再影响实例（避免旧 socket 误触发重连）
        detachSocket(sock) {
            if (!sock) return
            sock.onopen = sock.onmessage = sock.onerror = sock.onclose = null
        }

        cleanupConnections() {
            this.stopHeartbeat()
            if (this.reconnectTimer) {
                clearTimeout(this.reconnectTimer)
                this.reconnectTimer = null
            }
            this.video.srcObject?.getTracks().forEach(track => track.stop())
            this.video.srcObject = null
            if (this.peer) {
                this.peer.close()
                this.peer = null
            }
            if (this.socket) {
                this.detachSocket(this.socket)
                this.socket.close()
                this.socket = null
            }
        }

        registerEvent() {
            this.danmaku.addEventListener('submit', this.danmakuSubmit.bind(this))
        }

        danmakuSubmit(e) {
            e.preventDefault()
            if (!this.socket) return
            const input = this.danmaku.querySelector('input')
            const message = input.value.trim()
            if (!message) return
            this.sendMessage('danmaku', {
                message,
                roomId: this.roomId,
                username: this.username,
                userId: this.userId
            })
            input.value = ''
        }
    }

    const watch = new Watch()
    watch.start()
</script>
</body>
</html>
